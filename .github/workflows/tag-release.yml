name: Tag Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  linux-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU for ARM builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build and publish wheels
        uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --skip-existing --manylinux auto
        env:
          MATURIN_PYTHON_VERSION: "3.12"

  windows-wheels:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --skip-existing

  macos-wheels:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --skip-existing