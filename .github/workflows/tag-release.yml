name: Tag Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"

permissions:
  contents: write

jobs:
  linux-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup QEMU for ARM builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build manylinux/musllinux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          manylinux: auto

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheels
          path: target/wheels

  windows-wheels:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install maturin
      - name: Build wheels
        run: maturin build --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-wheels
          path: target/wheels

  macos-wheels:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install maturin
      - name: Build wheels
        run: maturin build --release
      - uses: actions/upload-artifact@v4
        with:
          name: macos-wheels
          path: target/wheels

  pypi-publish:
    needs: [linux-wheels, windows-wheels, macos-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Find and Move Wheels to root
        run: find dist -type f -name "*.whl" -exec mv {} dist/ \;

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Publish to PyPI
        run: uv publish dist --token ${{ secrets.MATURIN_PYPI_TOKEN }} *.whl dist/*